services:
  db:
    image: postgres:16-alpine
    container_name: fatwad-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fatwad
      POSTGRES_PASSWORD: fatwad
      POSTGRES_DB: fatwad
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - fatwad_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fatwad -d fatwad"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://fatwad:fatwad@db:5432/fatwad
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python -m src.db.seed && uvicorn src.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000
    command: ["streamlit", "run", "frontend/app.py", "--server.address=0.0.0.0", "--server.port=8501"]

volumes:
  fatwad_pgdata:
